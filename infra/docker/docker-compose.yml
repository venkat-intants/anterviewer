# ==============================================================================
# Intants AI Voice Interview Platform — Local Dev Stack
# ==============================================================================
# Run:  docker compose -f infra/docker/docker-compose.yml up -d
# Stop: docker compose -f infra/docker/docker-compose.yml down
# Logs: docker compose -f infra/docker/docker-compose.yml logs -f
# Wipe: docker compose -f infra/docker/docker-compose.yml down -v
#
# Services:
#   postgres   localhost:5432  Postgres 16 + pgvector
#   redis      localhost:6379  Redis 7
#   minio      localhost:9000  MinIO S3-compatible storage  (console: localhost:9001)
#   mailpit    localhost:1025  SMTP catcher                  (web UI: localhost:8025)
# ==============================================================================

services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: intants-postgres
    environment:
      POSTGRES_USER: intants
      POSTGRES_PASSWORD: intants_dev_pw
      POSTGRES_DB: intants_interview
    ports:
      - "${POSTGRES_PORT_HOST:-5433}:5432"   # host port overridable (local default 5433 avoids local Postgres collision; CI sets POSTGRES_PORT_HOST=5432). S4-006.
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intants -d intants_interview"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: intants-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: intants-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Init container — creates the S3 buckets on first run, then exits
  minio-init:
    image: minio/mc:latest
    container_name: intants-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/intants-interview-audio &&
      mc mb -p local/intants-interview-scorecards &&
      mc mb -p local/intants-uploads &&
      echo 'Buckets created: intants-interview-audio, intants-interview-scorecards, intants-uploads'
      "

  mailpit:
    image: axllent/mailpit:latest
    container_name: intants-mailpit
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI to see captured emails
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
