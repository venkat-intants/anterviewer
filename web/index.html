<!doctype html>
<html lang="en" class="dark" style="background-color: #000000;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Anterview — AI-powered voice interview platform" />
    <meta name="theme-color" content="#000000" />
    <meta name="color-scheme" content="dark" />
    <!-- Single forced aurora-dark theme: `dark` is hardcoded on <html> above so
         every `dark:` variant and the .dark token scope always apply. -->
    <script>
      try {
        document.documentElement.classList.add('dark');
        // Pre-paint theme: read the saved signal-accent theme and apply it to
        // <html data-theme> before React mounts, so there is no colour flash.
        var t = localStorage.getItem('intants:theme');
        document.documentElement.setAttribute(
          'data-theme',
          t === 'purple' || t === 'black' || t === 'blue' ? t : 'blue'
        );
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'blue');
      }
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Inter = app-wide (dark product UI). EB Garamond (serif display) + Geist
         (sans) power the Cluely-style light marketing/landing page. -->
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Geist:wght@300;400;500;600&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Anterview</title>
  </head>
  <body style="background-color: #000000;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
